name: skinsnap
description: Application mobile Flutter d'analyse skincare avec Firebase Auth et Google ML Kit
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.6.0

  google_mlkit_face_detection: ^0.12.0
  google_mlkit_image_labeling: ^0.13.0
  google_mlkit_language_id: ^0.11.0
  google_mlkit_selfie_segmentation: ^0.9.0
  google_mlkit_barcode_scanning: ^0.13.0

  http: ^1.2.2

  image_picker: ^1.1.2
  shared_preferences: ^2.3.0
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  vibration: ^2.0.0
  provider: ^6.1.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  uuid: ^4.5.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/app/
    - assets/images/products/skincare/
    - assets/images/products/makeup/
    - assets/images/categories/
